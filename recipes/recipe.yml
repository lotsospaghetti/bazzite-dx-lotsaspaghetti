---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-dx-lotsaspaghetti
description: This is my personal OS image.

# at some point I might switch to bazzite-dx-gnome to daily drive niri
# (gnome stuff is *much* simpler to uninstall than KDE)
base-image: ghcr.io/ublue-os/bazzite-dx
image-version: stable

modules:
  - type: script
    snippets:
      - "echo 'Enable Terra repo' && sed -i 's@enabled=0@enabled=1@g' /etc/yum.repos.d/terra.repo"
  - type: dnf
    install:
      packages:
        - zed
        - niri
        - xwayland-satellite
        - cliphist
        - wlsunset
        - matugen # TODO: ujust script for CLI (https://iniox.github.io/#matugen/usage)
        - cava
        - gpu-screen-recorder
      exclude:
        - alacritty
        - xdg-desktop-portal-*
    remove:
      auto-remove: true
      packages:
        - code

  - type: files
    files:
      - source: system
        destination: /

  - type: justfiles
    validate: true

  - type: chezmoi
    repository: ssh://git@codeberg.org/lotsaspaghetti/dotfiles.git
    all-users: false
    disable-update: true
    file-conflict-policy: skip

  - type: script
    snippets:
      - "echo 'Disable Terra repo' && sed -i 's@enabled=1@enabled=0@g' /etc/yum.repos.d/terra.repo"
      - "echo 'Add persistent /nix directory' && mkdir /nix"

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        repo:
          title: flathub
        install:
          - io.gitlab.librewolf-community
          - io.github.ungoogled_software.ungoogled_chromium
          - com.bitwarden.desktop
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
          - io.github.DenysMb.Kontainer
          - com.heroicgameslauncher.hgl
          - page.kramo.Cartridges
          - com.github.mtkennerly.ludusavi
          - io.github.hedge_dev.hedgemodmanager

  - type: fonts
    fonts:
      nerd-fonts:
        - AtkinsonHyperlegibleMono
      google-fonts:
        - Atkinson Hyperlegible Next

  - type: signing
